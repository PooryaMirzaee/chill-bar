services:
  postgres:
    image: postgres:16-alpine
    container_name: chillbar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chillbar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chillbar}
      POSTGRES_DB: ${POSTGRES_DB:-chillbar}
    volumes:
      - chillbar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chillbar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: chillbar-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-chillbar}:${POSTGRES_PASSWORD:-chillbar}@postgres:5432/${POSTGRES_DB:-chillbar}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:8081}
      SEED_ADMIN_USER: ${SEED_ADMIN_USER:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-chillbar123}
    expose:
      - "4000"
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - chillbar_uploads:/app/packages/api/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: chillbar-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: chillbar-admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8081:80"

volumes:
  chillbar_pgdata:
  chillbar_uploads:
